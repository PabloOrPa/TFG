<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="pata.png" type="image/png">
<title>💌 Mensaje importante!</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #ffe6f0, #e6f7ff);
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
}

.card {
    text-align: center;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    max-width: 420px;
    animation: fadeIn 1.2s ease;
}

h1 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #333;
}

p {
    color: #555;
    font-size: 15px;
    margin-top: 10px;
}

img {
    width: 100%;
    border-radius: 18px;
    margin: 15px 0;
    transition: transform 0.3s ease;
}

img:hover {
    transform: scale(1.03);
}

button {
    margin-top: 10px;
    padding: 16px 28px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #ff6fa5;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4d8d;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="card">
    <h1>💖 Hola Nazis</h1>

    <img src="https://pbs.twimg.com/media/EmkdCPRXMAUjOf4.jpg" alt="imagen">

    <p>
        No hay mucho que explicar.<br>
        Solo quería que vieras esto ❤️
    </p>

    <!--
    <button onclick="alert('Te quiero ❤️')">
        ¡Púlsame!
    </button>
    -->
    <button onclick="window.location.href='map.html'">
        ¿Dónde está mi chiquito?
    </button>
</div>

</body>
</html>
