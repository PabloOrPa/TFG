<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="pata.png" type="image/png">

<title>📍 Ubicación del chiquito</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #ffe6f0, #e6f7ff);
    font-family: 'Poppins', sans-serif;
}

.card {
    text-align: center;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    width: 90%;
    max-width: 700px;
}

#map {
    height: 400px;
    border-radius: 18px;
    overflow: hidden;
}

button {
    margin-top: 10px;
    padding: 16px 28px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #ff6fa5;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <h1>📍 Ubicación del chiquito</h1>

    <div id="map"></div>

    <p id="status">Conectando al servidor...</p>

    <button onclick="window.location.href='index.html'">
        Volver
    </button>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/*
=====================================
CREAR MAPA
=====================================
*/

const map = L.map('map').setView([40.4168, -3.7038], 6); // España inicial

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

/*
=====================================
MARKERS POR DISPOSITIVO
=====================================
*/

const markers = {};

/*
=====================================
WEBSOCKET CONNECTION
=====================================
*/

const status = document.getElementById("status");

const socket = new WebSocket("ws://" + location.host);

socket.onopen = () => {
    status.innerText = "🟢 Conectado en tiempo real";
};

socket.onclose = () => {
    status.innerText = "🔴 Conexión perdida";
};

socket.onerror = () => {
    status.innerText = "⚠️ Error de conexión";
};

/*
=====================================
RECIBIR DATOS REALTIME
=====================================
*/

socket.onmessage = (event) => {

    const data = JSON.parse(event.data);

    if (data.type !== "location") return;

    const { device, lat, lng } = data;
    const lat2 = lat + (Math.random() - 0.5) * 0.002;
    const lng2 = lng + (Math.random() - 0.5) * 0.002;
    const device2 = "AloPresidentesssss";
    updateDevice(device, lat, lng);
    updateDevice(device2, lat2, lng2);
};

/*
=====================================
ACTUALIZAR / CREAR DISPOSITIVO
=====================================
*/

function updateDevice(device, lat, lng) {

    if (!markers[device]) {

        markers[device] = L.marker([lat, lng])
            .addTo(map)
            .bindPopup("📱 " + device);

        console.log("Nuevo dispositivo:", device);

    } else {

        markers[device].setLatLng([lat, lng]);

    }

    // centrar mapa
    // SOLO centrar la primera vez
    if (!window.firstLocationReceived) {
        map.setView([lat, lng], 15);
        window.firstLocationReceived = true;
    }
}

</script>

</body>
</html>
